version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tiktok_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tiktok_analyzer
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: tiktok_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: tiktok_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://postgres:password@postgres:5432/tiktok_analyzer
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretkey123
    depends_on:
      - postgres
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: tiktok_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
